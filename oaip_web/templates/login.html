{% extends 'base.html' %}
{% block content %}
  <h2 class="mb-3" style="color:var(--accent)">Авторизация</h2>
  <form method="post" class="w-50 form-hero p-3">
    <div class="mb-3">
      <label class="form-label">Логин</label>
      <input name="login" class="form-control" placeholder="Введите логин" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Пароль</label>
      <input name="parol" type="password" class="form-control" placeholder="Введите пароль" required>
    </div>
    <button class="btn btn-primary" type="submit">Войти</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">Назад</a>
  </form>
{% endblock %}
