{% extends 'base.html' %}
{% block content %}
  <h2 style="color:var(--accent)">Пользователи</h2>
  <a href="{{ url_for('index') }}" class="btn btn-secondary mb-3">Главное меню</a>
  <div class="table-responsive">
  <table class="table table-striped">
    <thead>
      <tr><th>ID</th><th>Логин</th><th>Пароль</th><th>Действия</th></tr>
    </thead>
    <tbody>
      {% for u in users %}
      <tr>
        <td>{{ u[0] }}</td>
        <td>{{ u[1] }}</td>
        <td>{{ u[2] }}</td>
        <td>
          <a href="{{ url_for('edit_user', user_id=u[0]) }}" class="btn btn-sm btn-primary">Редактировать</a>
          <form action="{{ url_for('delete_user', user_id=u[0]) }}" method="post" style="display:inline-block" onsubmit="return confirm('Удалить пользователя {{ u[1] }}?')">
            <button class="btn btn-sm btn-danger" type="submit">Удалить</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  </div>
{% endblock %}
